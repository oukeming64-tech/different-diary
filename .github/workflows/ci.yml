name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.15.0
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build:pages
